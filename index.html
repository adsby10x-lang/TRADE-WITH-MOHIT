<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
background:#06171d;
overflow:hidden;
}

/* GRID LIKE TRADING SCREEN */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:50px 50px;
z-index:0;
}

/* ANIMATED CHART LINE */

.chart{
position:absolute;
bottom:0;
width:100%;
height:40%;
overflow:hidden;
z-index:1;
}

.chart svg{
width:200%;
height:100%;
animation:chartmove 12s linear infinite;
}

@keyframes chartmove{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CARD */

.container{
position:relative;
z-index:2;
text-align:center;
padding:35px;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:16px;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

.dp{
width:120px;
height:120px;
border-radius:50%;
border:3px solid #00c3ff;
margin-bottom:20px;
object-fit:cover;
}

h1{
font-size:30px;
margin-bottom:10px;
}

p{
font-size:15px;
color:#c7d4db;
line-height:1.6;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:30px;
padding:20px 50px;
font-size:22px;
font-weight:bold;
color:white;
background:#0088cc;
border-radius:12px;
text-decoration:none;
transition:0.3s;
box-shadow:0 8px 25px rgba(0,136,204,0.6);
}

.btn:hover{
background:#00aaff;
transform:scale(1.08);
}

.footer{
margin-top:25px;
font-size:12px;
color:#8aa1ac;
}

</style>
</head>
